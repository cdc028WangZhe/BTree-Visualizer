<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>B 树全功能交互演示</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; --node-bg: #ffffff; --node-border: #343a40; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button.delete { background: #dc3545; }
        button.reset { background: #6c757d; }
        canvas { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: grab; }
        .info { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="controls">
        <label>阶数 (M):</label>
        <select id="mSelect" onchange="initTree()">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
        <input type="number" id="keyInput" placeholder="输入 Key..." style="width: 80px">
        <button onclick="doInsert()">插入</button>
        <button class="delete" onclick="doDelete()">删除</button>
        <button class="reset" onclick="initTree()">清空重置</button>
    </div>

    <canvas id="treeCanvas"></canvas>
    <div class="info">提示：M 阶 B 树，每个节点最多 M-1 个 Key，最少 ⌈M/2⌉-1 个 Key。</div>

<script>
// --- B 树核心逻辑引擎 ---
class BNode {
    constructor(isLeaf) {
        this.keys = [];
        this.children = [];
        this.isLeaf = isLeaf;
    }
}

class BTree {
    constructor(m) {
        this.m = m; // Order
        this.minKeys = Math.ceil(m / 2) - 1;
        this.root = new BNode(true);
    }

    insert(key) {
        if (this.root.keys.includes(key)) return;
        let r = this.root;
        if (r.keys.length === this.m - 1) {
            let s = new BNode(false);
            this.root = s;
            s.children.push(r);
            this.split(s, 0);
            this._insertNonFull(s, key);
        } else {
            this._insertNonFull(r, key);
        }
    }

    split(parent, i) {
        let y = parent.children[i];
        let z = new BNode(y.isLeaf);
        let mid = Math.floor((this.m - 1) / 2);
        let midKey = y.keys[mid];

        z.keys = y.keys.splice(mid + 1);
        if (!y.isLeaf) z.children = y.children.splice(mid + 1);
        
        parent.keys.splice(i, 0, midKey);
        parent.children.splice(i + 1, 0, z);
        y.keys.pop(); // Remove the promoted key
    }

    _insertNonFull(x, k) {
        let i = x.keys.length - 1;
        if (x.isLeaf) {
            x.keys.push(k);
            x.keys.sort((a, b) => a - b);
        } else {
            while (i >= 0 && k < x.keys[i]) i--;
            i++;
            if (x.children[i].keys.length === this.m - 1) {
                this.split(x, i);
                if (k > x.keys[i]) i++;
            }
            this._insertNonFull(x.children[i], k);
        }
    }

    delete(k) { this._delete(this.root, k); if (this.root.keys.length === 0 && !this.root.isLeaf) this.root = this.root.children[0]; }

    _delete(x, k) {
        let i = 0;
        while (i < x.keys.length && k > x.keys[i]) i++;

        if (i < x.keys.length && x.keys[i] === k) {
            if (x.isLeaf) x.keys.splice(i, 1);
            else this._deleteInternal(x, i);
        } else if (!x.isLeaf) {
            let child = x.children[i];
            if (child.keys.length === this.minKeys) this._fill(x, i);
            this._delete(x.children[i === x.keys.length + 1 && i > x.keys.length ? i-1 : i], k);
        }
    }

    _deleteInternal(x, i) {
        let k = x.keys[i], left = x.children[i], right = x.children[i+1];
        if (left.keys.length > this.minKeys) {
            let pred = this._getPred(left);
            x.keys[i] = pred;
            this._delete(left, pred);
        } else if (right.keys.length > this.minKeys) {
            let succ = this._getSucc(right);
            x.keys[i] = succ;
            this._delete(right, succ);
        } else {
            this._merge(x, i);
            this._delete(left, k);
        }
    }

    _getPred(x) { while (!x.isLeaf) x = x.children[x.keys.length]; return x.keys[x.keys.length - 1]; }
    _getSucc(x) { while (!x.isLeaf) x = x.children[0]; return x.keys[0]; }

    _fill(x, i) {
        if (i !== 0 && x.children[i-1].keys.length > this.minKeys) this._borrowPrev(x, i);
        else if (i !== x.keys.length && x.children[i+1].keys.length > this.minKeys) this._borrowNext(x, i);
        else i !== x.keys.length ? this._merge(x, i) : this._merge(x, i-1);
    }

    _borrowPrev(x, i) {
        let child = x.children[i], sibling = x.children[i-1];
        child.keys.unshift(x.keys[i-1]);
        if (!child.isLeaf) child.children.unshift(sibling.children.pop());
        x.keys[i-1] = sibling.keys.pop();
    }

    _borrowNext(x, i) {
        let child = x.children[i], sibling = x.children[i+1];
        child.keys.push(x.keys[i]);
        if (!child.isLeaf) child.children.push(sibling.children.shift());
        x.keys[i] = sibling.keys.shift();
    }

    _merge(x, i) {
        let child = x.children[i], sibling = x.children[i+1];
        child.keys.push(x.keys[i]);
        child.keys.push(...sibling.keys);
        if (!child.isLeaf) child.children.push(...sibling.children);
        x.keys.splice(i, 1);
        x.children.splice(i + 1, 1);
    }
}

// --- 绘图引擎 ---
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');
let tree;

function initTree() {
    const m = parseInt(document.getElementById('mSelect').value);
    tree = new BTree(m);
    [10, 20, 30, 40, 50].forEach(k => tree.insert(k));
    render();
}

function doInsert() {
    const val = parseInt(document.getElementById('keyInput').value);
    if (!isNaN(val)) tree.insert(val);
    render();
}

function doDelete() {
    const val = parseInt(document.getElementById('keyInput').value);
    if (!isNaN(val)) tree.delete(val);
    render();
}

function render() {
    canvas.width = window.innerWidth * 0.9;
    canvas.height = 600;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const layout = calculateLayout(tree.root, 0, 0, canvas.width);
    drawNode(tree.root, canvas.width / 2, 50, canvas.width / 2);
}

function drawNode(node, x, y, width) {
    const nodeW = node.keys.length * 30 + 10;
    const nodeH = 30;

    if (!node.isLeaf) {
        const childCount = node.children.length;
        const step = width / childCount;
        node.children.forEach((child, i) => {
            const childX = x - width / 2 + step * i + step / 2;
            const childY = y + 80;
            ctx.beginPath();
            ctx.moveTo(x, y + nodeH / 2);
            ctx.lineTo(childX, childY - nodeH / 2);
            ctx.strokeStyle = '#aaa';
            ctx.stroke();
            drawNode(child, childX, childY, step);
        });
    }

    ctx.fillStyle = "white";
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 2;
    ctx.strokeRect(x - nodeW / 2, y - nodeH / 2, nodeW, nodeH);
    ctx.fillRect(x - nodeW / 2, y - nodeH / 2, nodeW, nodeH);

    ctx.fillStyle = "black";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    node.keys.forEach((k, i) => {
        ctx.fillText(k, x - nodeW / 2 + 20 + i * 30, y);
    });
}

function calculateLayout(node, depth, x, width) { return width; } // 简化版自动布局

initTree();
</script>
</body>
</html>
